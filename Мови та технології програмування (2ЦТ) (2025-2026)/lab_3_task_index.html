<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфоліо</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
            font-family: Arial, sans-serif;
        }

        body {
            padding: 20px;
        }

        nav {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        nav a {
            text-decoration: none;
            padding: 14px 20px;
            background: #f2f2f2;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        nav a:hover {
            transform: scale(1.05);
        }

        .portfolio {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            padding: 30px;
            border: 1px solid #ccc;
            border-radius: 10px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        @media (max-width: 768px) {
            .portfolio {
                grid-template-columns: 1fr;
            }

            nav a {
                width: 100%;
                text-align: center;
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="#home">Головна</a>
        <a href="#portfolio">Портфоліо</a>
        <a href="#contact">Контакти</a>
    </nav>

    <section id="portfolio" class="portfolio">
        <div class="card">Проєкт 1</div>
        <div class="card">Проєкт 2</div>
        <div class="card">Проєкт 3</div>
    </section>
</body>
</html>
